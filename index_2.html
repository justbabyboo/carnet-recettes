<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet d'été</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Recettes C&amp;M">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F4ECDA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6; --ink:#1A2B22; --herb:#2F6B4F; --zest:#E8B23A;
    --stone:#6B7268; --line:#E4E2D8; --card:#FFFFFF;
    --herb-soft:#EAF1EC; --zest-soft:#FBF2DC;
    --shadow:0 1px 2px rgba(26,43,34,.04), 0 8px 24px rgba(26,43,34,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; line-height:1.5;
    -webkit-font-smoothing:antialiased; padding-bottom:96px;
  }
  .wrap{max-width:760px; margin:0 auto; padding:0 18px}

  /* Masthead */
  header{padding:28px 0 18px; border-bottom:1px solid var(--line); margin-bottom:22px}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--stone); font-weight:600}
  h1{font-family:"Fraunces",serif; font-weight:600; font-size:clamp(34px,9vw,52px); line-height:.98; letter-spacing:-.01em; margin:6px 0 8px}
  h1 em{font-style:italic; color:var(--herb)}
  .lede{color:var(--stone); font-size:14px; max-width:46ch}
  .sync{display:inline-block; margin-top:10px; font-size:11px; letter-spacing:.04em; color:var(--stone); border:1px solid var(--line); background:var(--card); padding:3px 10px; border-radius:999px}
  .sync.on{color:var(--herb); border-color:var(--herb-soft); background:var(--herb-soft)}

  /* Tabs */
  .tabs{position:sticky; top:0; z-index:20; background:linear-gradient(var(--paper) 70%, rgba(251,250,246,0)); padding:10px 0 12px; display:flex; gap:8px}
  .tab{appearance:none; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:inherit; font-size:14px; font-weight:500; padding:9px 16px; border-radius:999px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:.18s ease}
  .tab[aria-selected="true"]{background:var(--ink); color:var(--paper); border-color:var(--ink)}
  .tab .count{font-size:12px; min-width:20px; height:20px; padding:0 6px; border-radius:999px; background:var(--zest); color:var(--ink); display:inline-flex; align-items:center; justify-content:center; font-weight:600}
  .tab[aria-selected="true"] .count{background:var(--zest)}

  /* Recipe grid */
  .toolbar{margin-bottom:18px}
  .searchwrap{position:relative; margin-bottom:14px}
  .searchwrap .searchic{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--stone); font-size:18px}
  #search{width:100%; border:1px solid var(--line); background:var(--card); border-radius:999px; padding:11px 16px 11px 40px; font-family:inherit; font-size:15px; color:var(--ink); -webkit-appearance:none}
  #search:focus{outline:none; border-color:var(--herb)}
  .fgroup{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px}
  .fglabel{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--stone); font-weight:600; min-width:62px}
  .fchip{appearance:none; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:inherit; font-size:13px; padding:5px 12px; border-radius:999px; cursor:pointer; transition:.13s ease}
  .fchip:hover{border-color:var(--herb)}
  .fchip.on{background:var(--herb); color:#fff; border-color:var(--herb)}
  .filterbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:4px; min-height:20px}
  .rcount{font-size:13px; color:var(--stone)}
  .resetf{appearance:none; border:0; background:transparent; color:var(--herb); font-size:13px; cursor:pointer; text-decoration:underline; text-underline-offset:2px}
  .tbadge{font-size:11px; color:var(--stone); background:var(--paper); border:1px solid var(--line); padding:2px 8px; border-radius:999px; font-weight:500}
  .grid{display:grid; grid-template-columns:1fr; gap:16px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; opacity:0; transform:translateY(8px); animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1; transform:none}}
  .thumb{position:relative; aspect-ratio:16/10; cursor:pointer; overflow:hidden}
  .thumb .fallback{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:58px; filter:drop-shadow(0 6px 10px rgba(26,43,34,.12)); box-shadow:inset 0 -40px 60px -40px rgba(26,43,34,.12)}
  .thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform .5s ease}
  .card:hover .thumb img{transform:scale(1.04)}
  .meta{padding:14px 16px 16px; display:flex; flex-direction:column; gap:10px; flex:1}
  .rname{font-family:"Fraunces",serif; font-size:21px; font-weight:600; letter-spacing:-.01em; cursor:pointer; line-height:1.1}
  .tags{display:flex; flex-wrap:wrap; gap:6px}
  .tag{font-size:11px; color:var(--herb); background:var(--herb-soft); padding:3px 9px; border-radius:999px; font-weight:500; letter-spacing:.02em}
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:auto}
  .stepper{display:inline-flex; align-items:center; gap:2px; border:1px solid var(--line); border-radius:999px; padding:3px}
  .stepper button{appearance:none; border:0; background:transparent; width:26px; height:26px; border-radius:999px; cursor:pointer; font-size:17px; color:var(--ink); line-height:1; display:grid; place-items:center}
  .stepper button:hover{background:var(--herb-soft)}
  .stepper .val{min-width:54px; text-align:center; font-size:12px; color:var(--stone)}
  .add{appearance:none; border:1px solid var(--herb); background:var(--card); color:var(--herb); font-family:inherit; font-weight:600; font-size:13px; padding:8px 14px; border-radius:999px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.15s ease; white-space:nowrap}
  .add:hover{background:var(--herb-soft)}
  .add.in{background:var(--herb); color:#fff; border-color:var(--herb)}
  .add .ic{font-size:14px; line-height:1}

  /* Detail panel */
  .sheet-back{position:fixed; inset:0; background:rgba(26,43,34,.32); opacity:0; pointer-events:none; transition:.25s ease; z-index:40}
  .sheet-back.open{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:0; right:0; bottom:0; max-height:88vh; background:var(--paper); border-radius:22px 22px 0 0; transform:translateY(100%); transition:transform .32s cubic-bezier(.2,.7,.3,1); z-index:41; overflow:auto; padding-bottom:30px}
  .sheet.open{transform:none}
  @media(min-width:620px){.sheet{max-width:560px; margin:0 auto; border-radius:22px; bottom:auto; top:50%; transform:translate(0,-50%) scale(.96); opacity:0} .sheet.open{transform:translateY(-50%); opacity:1}}
  .handle{width:38px; height:4px; background:var(--line); border-radius:99px; margin:10px auto 0}
  .sheet-hd{padding:14px 22px 4px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
  .sheet-hd h2{font-family:"Fraunces",serif; font-size:26px; font-weight:600; letter-spacing:-.01em; line-height:1.05}
  .close{appearance:none; border:1px solid var(--line); background:var(--card); width:34px; height:34px; border-radius:999px; cursor:pointer; font-size:16px; color:var(--stone); flex:none}
  .sheet-body{padding:8px 22px 0}
  .photo-edit{display:flex; gap:14px; align-items:center; margin:6px 0 4px}
  .photo-prev{position:relative; width:96px; height:72px; border-radius:12px; overflow:hidden; flex:none; display:grid; place-items:center; border:1px solid var(--line)}
  .photo-prev .pf{font-size:30px}
  .photo-prev img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .photo-act{display:flex; flex-direction:column; gap:6px; align-items:flex-start}
  .photobtn{appearance:none; border:1px solid var(--herb); background:var(--herb-soft); color:var(--herb); font-family:inherit; font-weight:600; font-size:13px; padding:8px 14px; border-radius:999px; cursor:pointer}
  .photolink{appearance:none; border:0; background:transparent; color:var(--stone); font-size:12px; cursor:pointer; text-decoration:underline; text-underline-offset:2px; padding:0}
  .photo-msg{font-size:12px; color:var(--stone)}
  /* note + commentaires */
  .stars{display:inline-flex; gap:3px}
  .star{font-size:24px; line-height:1; cursor:pointer; color:var(--line); transition:.1s ease; background:none; border:0; padding:0}
  .star.on{color:var(--zest)}
  .star:hover{transform:scale(1.12)}
  .rate-meta{font-size:12px; color:var(--stone); margin-left:8px}
  .clist{display:flex; flex-direction:column; gap:10px; margin:4px 0 14px}
  .cempty{font-size:13px; color:var(--stone); padding:6px 0}
  .cmt{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px}
  .cmt-h{display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:3px}
  .cmt-a{font-size:13px; font-weight:600; color:var(--ink)}
  .cmt-t{font-size:11px; color:var(--stone)}
  .cmt-b{font-size:14px; color:var(--ink); white-space:pre-wrap; word-break:break-word}
  .cmt-x{appearance:none; border:0; background:transparent; color:var(--stone); cursor:pointer; font-size:13px; padding:0; margin-left:6px}
  .composer{display:flex; flex-direction:column; gap:8px; margin-bottom:8px}
  .composer input, .composer textarea{width:100%; border:1px solid var(--line); border-radius:12px; padding:9px 12px; font-family:inherit; font-size:14px; color:var(--ink); background:var(--card); -webkit-appearance:none}
  .composer input:focus, .composer textarea:focus{outline:none; border-color:var(--herb)}
  .composer textarea{min-height:62px; resize:vertical}
  .composer .cname{max-width:200px}
  .cadd{align-self:flex-start; appearance:none; border:1px solid var(--herb); background:var(--herb); color:#fff; font-family:inherit; font-weight:600; font-size:13px; padding:8px 16px; border-radius:999px; cursor:pointer}
  .cadd:disabled{opacity:.5; cursor:default}
  .subhd{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--stone); font-weight:600; margin:20px 0 10px}
  .ing-head{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:8px}
  .ing-head .stepper{margin-bottom:2px}
  .ing-list{list-style:none; display:flex; flex-direction:column; gap:2px}
  .ing-list li{display:flex; justify-content:space-between; gap:14px; padding:7px 0; border-bottom:1px solid var(--line); font-size:14px}
  .ing-list li .q{color:var(--stone); white-space:nowrap}
  .steps{list-style:none; counter-reset:s; display:flex; flex-direction:column; gap:14px; margin-top:4px}
  .steps li{display:flex; gap:13px; font-size:14px}
  .steps li::before{counter-increment:s; content:counter(s); flex:none; width:26px; height:26px; border-radius:999px; background:var(--herb-soft); color:var(--herb); font-weight:600; font-size:13px; display:grid; place-items:center; font-family:"Fraunces",serif}

  /* Shopping list */
  .empty{text-align:center; padding:54px 20px; color:var(--stone)}
  .empty .big{font-size:44px; margin-bottom:14px}
  .empty p{font-size:14px; max-width:34ch; margin:0 auto}
  .list-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; flex-wrap:wrap}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 18px}
  .chip{font-size:12px; background:var(--card); border:1px solid var(--line); padding:5px 11px 5px 12px; border-radius:999px; display:inline-flex; align-items:center; gap:7px}
  .chip button{appearance:none; border:0; background:transparent; cursor:pointer; color:var(--stone); font-size:14px; line-height:1; padding:0}
  .clearall{appearance:none; border:0; background:transparent; color:var(--stone); font-size:13px; cursor:pointer; text-decoration:underline; text-underline-offset:2px}
  .aisle{margin-bottom:8px}
  .aisle h3{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--herb); font-weight:600; margin:18px 0 6px}
  .check{display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none}
  .box{flex:none; width:21px; height:21px; border:2px solid var(--line); border-radius:7px; display:grid; place-items:center; transition:.15s ease}
  .box svg{width:13px; height:13px; opacity:0; transform:scale(.6); transition:.15s ease}
  .check.on .box{background:var(--zest); border-color:var(--zest)}
  .check.on .box svg{opacity:1; transform:none}
  .check .name{font-size:14.5px; flex:1; transition:.15s ease}
  .check .qty{font-size:13px; color:var(--stone); white-space:nowrap}
  .check.on .name{color:var(--stone); text-decoration:line-through}
  .progress{font-size:13px; color:var(--stone)}

  .foot{margin:40px 0 8px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--stone); text-align:center}
  [hidden]{display:none!important}
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Recettes fraîches · à deux</div>
    <h1>Carnet d'<em>été</em></h1>
    <p class="lede">Choisis tes recettes, la liste de courses se monte toute seule — quantités additionnées, rangées par rayon.</p>
    <div id="sync-status" class="sync"></div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab" id="tab-r" role="tab" aria-selected="true" onclick="setView('recipes')">Recettes</button>
    <button class="tab" id="tab-c" role="tab" aria-selected="false" onclick="setView('cart')">Courses <span class="count" id="cart-count" hidden>0</span></button>
  </nav>

  <section id="view-recipes">
    <div class="toolbar">
      <div class="searchwrap">
        <span class="searchic">⌕</span>
        <input id="search" type="search" placeholder="Rechercher une recette ou un ingrédient…" oninput="onSearch(this.value)" autocomplete="off">
      </div>
      <div id="filters"></div>
      <div class="filterbar">
        <span id="rcount" class="rcount"></span>
        <button id="resetf" class="resetf" onclick="resetFilters()" hidden>Réinitialiser</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <section id="view-cart" hidden></section>

  <div class="foot">Carnet d'été — ajoute tes recettes dans le fichier, dépose les photos dans <code>/images</code>.<br>Photos : <a href="https://commons.wikimedia.org/wiki/Category:Food" style="color:var(--herb)">Wikimedia Commons</a> (licences Creative Commons).</div>
</div>

<div class="sheet-back" id="sheet-back" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="handle"></div>
  <div class="sheet-hd"><h2 id="d-name"></h2><button class="close" onclick="closeSheet()" aria-label="Fermer">✕</button></div>
  <div class="sheet-body" id="d-body"></div>
</div>

<script src="recipes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* Les recettes sont chargées depuis recipes.js (window.RECIPES).
   Pour ajouter / modifier une recette, édite recipes.js — pas ce fichier. */
const RECIPES = (window.RECIPES || []);

/* ====== SYNCHRO TEMPS RÉEL (optionnel) ======
   Vide  => liste locale, chacun la sienne (rien ne casse).
   Rempli => liste de courses partagée et synchronisée en direct entre vous deux.
   La clé = la clé PUBLISHABLE Supabase (sb_publishable_...), JAMAIS la clé secrète. */
const CONFIG = {
  url:  "https://mqywmnylglrgbnjurppm.supabase.co",  // ex : https://xxxxxxxx.supabase.co
  key:  "sb_publishable_BxeLUpWxJwtu9rA6MTaMyQ_gi6m9HTL",  // clé publishable (sb_publishable_...)
  list: "carnet-cm-7f3a9"    // code secret partagé entre Can et toi
};

const AISLE_ORDER = ["Fruits","Légumes","Herbes","Crèmerie","Boulangerie","Épicerie"];

/* ---- filtres ---- */
const GROUP_DEFS = [
  { label:"Type",    tags:["salade","pâtes","soupe","gratin"] },
  { label:"Cuisson", tags:["four","sans cuisson","mijoté","poêle","friture"] },
  { label:"Cuisine", tags:["italien","grec"] },
  { label:"Régime",  tags:["végé","vegan"] },
];
const TIME_OPTS = [
  { key:"15", label:"≤ 15 min", test:t=>t<=15 },
  { key:"30", label:"≤ 30 min", test:t=>t<=30 },
  { key:"60", label:"≤ 1 h",    test:t=>t<=60 },
  { key:"61", label:"+ 1 h",    test:t=>t>60 },
];
const activeTags = new Set();   // tags sélectionnés
let activeTime = null;          // clé de TIME_OPTS
let query = "";                 // texte de recherche

/* ---- state (en mémoire pour la session) ---- */
const sel = new Map();        // id -> servings choisis
const checked = new Set();    // "item__unit" cochés
const overrides = new Map();  // recipe_id -> URL de photo perso (depuis Supabase)
const ratings = new Map();    // recipe_id -> note (1..5), partagée
const comments = new Map();   // recipe_id -> [ {id, author, body, created_at} ]
let myName = "";              // prénom utilisé pour signer les commentaires (session)
let openId = null;            // recette actuellement ouverte dans la fiche
let view = "recipes";

/* ---- helpers ---- */
const $ = s => document.querySelector(s);
function fmt(n){ return (Math.round(n*100)/100).toString(); }
function qtyText(qty,unit){ if(qty===0||qty==null) return ""; return unit ? `${fmt(qty)} ${unit}` : `${fmt(qty)}`; }
function imageFor(r){ return overrides.get(r.id) || r.image; }  // photo perso prioritaire
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function cdate(s){ try{ return new Date(s).toLocaleDateString("fr-FR",{day:"numeric",month:"short"})+" "+new Date(s).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
/* teinte gourmande par recette (utilisée tant qu'il n'y a pas de photo) */
function tintFor(r){
  const map={
    "🥗":["#E9F2E4","#C7DEB8"], "🫒":["#EDF1DC","#C8D6A0"],
    "🍉":["#FBE2E8","#E4F0D6"], "🍋":["#FBF3D6","#F1E099"],
    "🍊":["#FCE7C9","#F8D396"], "🍅":["#FBDDD1","#EFAE93"],
    "🍆":["#ECE0F1","#C5AED4"], "🌶️":["#FBDFD4","#F4C2A4"],
    "🍝":["#FBE8CD","#EEC08F"], "🫘":["#F1E4D2","#D4B383"]
  };
  const c = map[r.emoji] || ["#EFEBDD","#D6CFB9"];
  return `radial-gradient(120% 100% at 30% 22%, ${c[0]}, ${c[1]})`;
}

/* ---- filtrage ---- */
function matchesRecipe(r){
  if(query){
    const q = query.toLowerCase();
    const hit = r.name.toLowerCase().includes(q) || r.ingredients.some(i=>i.item.toLowerCase().includes(q));
    if(!hit) return false;
  }
  if(activeTime){
    const opt = TIME_OPTS.find(o=>o.key===activeTime);
    if(opt && !opt.test(r.temps||999)) return false;
  }
  // chaque groupe ayant des tags actifs doit avoir au moins une correspondance (ET entre groupes, OU dans un groupe)
  for(const g of GROUP_DEFS){
    const act = g.tags.filter(t=>activeTags.has(t));
    if(act.length && !act.some(t=>r.tags.includes(t))) return false;
  }
  return true;
}

/* ---- render recipes ---- */
function renderGrid(){
  const g = $("#grid"); g.innerHTML = "";
  if(!RECIPES.length){
    g.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">📖</div><p>Aucune recette chargée. Vérifie que <code>recipes.js</code> est bien à côté de <code>index.html</code>.</p></div>`;
    return;
  }
  const list = RECIPES.filter(matchesRecipe);
  updateFilterBar(list.length);
  if(!list.length){
    g.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">🔍</div><p>Aucune recette ne correspond. Essaie d'enlever un filtre ou de changer ta recherche.</p></div>`;
    return;
  }
  list.forEach((r,i)=>{
    if(!sel.has(r.id)) sel.set(r.id, r.servings);
    const card = document.createElement("article");
    card.className="card"; card.style.animationDelay=(i*55)+"ms";
    card.innerHTML = `
      <div class="thumb" onclick="openSheet('${r.id}')">
        <div class="fallback" style="background:${tintFor(r)}">${r.emoji}</div>
        <img alt="" src="${imageFor(r)}" onerror="this.remove()">
      </div>
      <div class="meta">
        <div class="rname" onclick="openSheet('${r.id}')">${r.name}</div>
        <div class="tags">${r.tags.map(t=>`<span class="tag">${t}</span>`).join("")}${r.temps?`<span class="tbadge">⏱ ${r.temps} min</span>`:``}${ratings.get(r.id)?`<span class="tbadge">★ ${ratings.get(r.id)}</span>`:``}${(comments.get(r.id)||[]).length?`<span class="tbadge">💬 ${(comments.get(r.id)||[]).length}</span>`:``}</div>
        <div class="row">
          <div class="stepper">
            <button onclick="bump('${r.id}',-1)" aria-label="moins">–</button>
            <span class="val" id="sv-${r.id}">${sel.get(r.id)} pers.</span>
            <button onclick="bump('${r.id}',1)" aria-label="plus">+</button>
          </div>
          <button class="add ${cartHas(r.id)?'in':''}" id="add-${r.id}" onclick="toggleCart('${r.id}')">
            <span class="ic">${cartHas(r.id)?'✓':'+'}</span>${cartHas(r.id)?'Ajouté':'Courses'}
          </button>
        </div>
      </div>`;
    g.appendChild(card);
  });
}

/* ---- UI des filtres ---- */
function renderFilters(){
  const host = $("#filters"); if(!host) return;
  const all = new Set(RECIPES.flatMap(r=>r.tags));
  let html = "";
  GROUP_DEFS.forEach(g=>{
    const tags = g.tags.filter(t=>all.has(t));
    if(!tags.length) return;
    html += `<div class="fgroup"><span class="fglabel">${g.label}</span>` +
      tags.map(t=>`<button class="fchip ${activeTags.has(t)?'on':''}" onclick="toggleFilter('${t}')">${t}</button>`).join("") + `</div>`;
  });
  html += `<div class="fgroup"><span class="fglabel">Temps</span>` +
    TIME_OPTS.map(o=>`<button class="fchip ${activeTime===o.key?'on':''}" onclick="setTime('${o.key}')">${o.label}</button>`).join("") + `</div>`;
  host.innerHTML = html;
}
function toggleFilter(t){ activeTags.has(t)?activeTags.delete(t):activeTags.add(t); renderFilters(); renderGrid(); }
function setTime(k){ activeTime = (activeTime===k? null : k); renderFilters(); renderGrid(); }
function onSearch(v){ query = v.trim(); renderGrid(); }
function resetFilters(){ activeTags.clear(); activeTime=null; query=""; const s=$("#search"); if(s) s.value=""; renderFilters(); renderGrid(); }
function updateFilterBar(n){
  const active = activeTags.size>0 || activeTime || query;
  const c = $("#rcount"), btn = $("#resetf");
  if(c) c.textContent = active ? `${n} recette${n>1?"s":""}` : "";
  if(btn) btn.hidden = !active;
}

const cart = new Set();
function cartHas(id){ return cart.has(id); }
function toggleCart(id){
  cart.has(id) ? cart.delete(id) : cart.add(id);
  const b = $("#add-"+id);
  b.classList.toggle("in", cart.has(id));
  b.innerHTML = `<span class="ic">${cart.has(id)?'✓':'+'}</span>${cart.has(id)?'Ajouté':'Courses'}`;
  updateCount(); if(view==="cart") renderCart();
  cart.has(id) ? dbAddCart(id) : dbDelCart(id);
}
function bump(id,d){
  const r = RECIPES.find(x=>x.id===id);
  const v = Math.max(1, (sel.get(id)||r.servings)+d);
  sel.set(id, v);
  const cardVal = $("#sv-"+id); if(cardVal) cardVal.textContent = v+" pers.";   // stepper sur la carte
  if(openId===id){                                                             // fiche ouverte : recalcule les ingrédients
    const sv = $("#serv-"+id); if(sv) sv.textContent = v+" pers.";
    const list = $("#inglist-"+id);
    if(list){
      const ratio = v/r.servings;
      list.innerHTML = r.ingredients.map(x=>`<li><span>${x.item}</span><span class="q">${qtyText(x.qty*ratio,x.unit)||"—"}</span></li>`).join("");
    }
  }
  if(view==="cart") renderCart();
  dbServings(id);
}
function updateCount(){
  const c = cart.size, el=$("#cart-count");
  el.textContent = c; el.hidden = c===0;
}

/* ---- detail sheet ---- */
function openSheet(id){
  const r = RECIPES.find(x=>x.id===id);
  $("#d-name").textContent = r.name;
  const serv = sel.get(r.id) || r.servings;
  const ratio = serv / r.servings;
  const ing = r.ingredients.map(x=>`<li><span>${x.item}</span><span class="q">${qtyText(x.qty*ratio,x.unit)||"—"}</span></li>`).join("");
  const steps = r.steps.map(s=>`<li>${s}</li>`).join("");
  const hasOverride = overrides.has(r.id);
  const photo = `
    <div class="photo-edit">
      <div class="photo-prev" style="background:${tintFor(r)}">
        <span class="pf">${r.emoji}</span>
        <img alt="" src="${imageFor(r)}" onerror="this.remove()">
      </div>
      <div class="photo-act">
        <label class="photobtn" id="pb-${r.id}">📷 Changer la photo
          <input type="file" accept="image/*" hidden onchange="onPhotoPick('${r.id}', this)">
        </label>
        ${hasOverride ? `<button class="photolink" onclick="removePhoto('${r.id}')">Remettre par défaut</button>` : ``}
        <div class="photo-msg" id="pm-${r.id}"></div>
      </div>
    </div>`;
  $("#d-body").innerHTML = `
    ${photo}
    <div class="ing-head">
      <div class="subhd" style="margin:20px 0 0">Ingrédients</div>
      <div class="stepper">
        <button onclick="bump('${r.id}',-1)" aria-label="moins">–</button>
        <span class="val" id="serv-${r.id}">${serv} pers.</span>
        <button onclick="bump('${r.id}',1)" aria-label="plus">+</button>
      </div>
    </div>
    <ul class="ing-list" id="inglist-${r.id}">${ing}</ul>
    <div class="subhd">Préparation</div>
    <ol class="steps">${steps}</ol>
    <div class="subhd">Note</div>
    <div id="rate-${r.id}"></div>
    <div class="subhd">Commentaires</div>
    <div class="clist" id="clist-${r.id}"></div>
    <div class="composer">
      <input class="cname" id="cauthor" placeholder="Votre prénom" value="${esc(myName)}" oninput="myName=this.value">
      <textarea id="cbody" placeholder="Une note, une astuce, un avis… (ex. « plus de citron la prochaine fois »)" oninput="$('#cadd-${r.id}').disabled=!this.value.trim()"></textarea>
      <button class="cadd" id="cadd-${r.id}" onclick="addComment('${r.id}')" disabled>Ajouter</button>
    </div>`;
  openId = id;
  renderRating(id);
  renderComments(id);
  $("#sheet").classList.add("open"); $("#sheet-back").classList.add("open");
}
function closeSheet(){ openId=null; $("#sheet").classList.remove("open"); $("#sheet-back").classList.remove("open"); }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSheet(); });

/* ---- note (étoiles) ---- */
function renderRating(id){
  const host = $("#rate-"+id); if(!host) return;
  const cur = ratings.get(id) || 0;
  let stars = "";
  for(let n=1;n<=5;n++) stars += `<button class="star ${n<=cur?'on':''}" onclick="setRating('${id}',${n})" aria-label="${n} étoile${n>1?'s':''}">★</button>`;
  host.innerHTML = `<span class="stars">${stars}</span>` + (cur?`<span class="rate-meta">${cur}/5</span>`:`<span class="rate-meta">pas encore notée</span>`);
}
function setRating(id,n){
  const cur = ratings.get(id);
  if(cur===n){ ratings.delete(id); } else { ratings.set(id,n); }   // re-cliquer la même étoile annule
  renderRating(id); renderGrid();
  ratings.has(id) ? dbSetRating(id, ratings.get(id)) : dbDelRating(id);
}

/* ---- commentaires ---- */
function renderComments(id){
  const host = $("#clist-"+id); if(!host) return;
  const arr = comments.get(id) || [];
  if(!arr.length){ host.innerHTML = `<div class="cempty">Aucun commentaire pour l'instant.</div>`; return; }
  host.innerHTML = arr.map(c=>`
    <div class="cmt">
      <div class="cmt-h">
        <span class="cmt-a">${esc(c.author)||"Anonyme"}</span>
        <span><span class="cmt-t">${cdate(c.created_at)}</span><button class="cmt-x" onclick="delComment('${id}','${c.id}')" aria-label="supprimer">✕</button></span>
      </div>
      <div class="cmt-b">${esc(c.body)}</div>
    </div>`).join("");
}
function addComment(id){
  const ta = $("#cbody"); const body = (ta.value||"").trim(); if(!body) return;
  const author = (($("#cauthor")||{}).value||"").trim(); myName = author;
  const row = { id:"tmp"+Date.now(), recipe_id:id, author, body, created_at:new Date().toISOString() };
  const arr = comments.get(id) || []; arr.push(row); comments.set(id, arr);
  ta.value = ""; $("#cadd-"+id).disabled = true; renderComments(id);
  dbAddComment(id, author, body);
}
function delComment(id, cid){
  const arr = (comments.get(id)||[]).filter(c=>String(c.id)!==String(cid));
  comments.set(id, arr); renderComments(id);
  if(!String(cid).startsWith("tmp")) dbDelComment(cid);
}

/* ---- shopping list (auto) ---- */
function buildList(){
  const map = new Map();
  cart.forEach(id=>{
    const r = RECIPES.find(x=>x.id===id);
    const ratio = (sel.get(id)||r.servings)/r.servings;
    r.ingredients.forEach(ing=>{
      const key = ing.item.toLowerCase()+"__"+ing.unit;
      if(!map.has(key)) map.set(key,{item:ing.item, unit:ing.unit, cat:ing.cat, qty:0});
      map.get(key).qty += ing.qty*ratio;
    });
  });
  const byAisle = {};
  [...map.entries()].forEach(([key,v])=>{ (byAisle[v.cat]=byAisle[v.cat]||[]).push({key,...v}); });
  return byAisle;
}
function renderCart(){
  const host = $("#view-cart");
  if(cart.size===0){
    host.innerHTML = `<div class="empty"><div class="big">🧺</div><p>Aucune recette sélectionnée. Ajoute des recettes et ta liste de courses se construit ici.</p></div>`;
    return;
  }
  const byAisle = buildList();
  const total = Object.values(byAisle).reduce((n,a)=>n+a.length,0);
  const done = [...checked].filter(k=>{
    return Object.values(byAisle).some(a=>a.some(i=>i.key===k));
  }).length;
  const chips = [...cart].map(id=>{
    const r=RECIPES.find(x=>x.id===id);
    return `<span class="chip">${r.emoji} ${r.name}<button onclick="toggleCart('${id}')" aria-label="retirer">✕</button></span>`;
  }).join("");
  let html = `<div class="list-head">
      <div><div class="subhd" style="margin:0 0 4px">Liste de courses</div><div class="progress">${done}/${total} cochés</div></div>
      <button class="clearall" onclick="clearChecks()">Tout décocher</button>
    </div>
    <div class="chips">${chips}</div>`;
  AISLE_ORDER.filter(a=>byAisle[a]).forEach(a=>{
    const items = byAisle[a].sort((x,y)=>x.item.localeCompare(y.item));
    html += `<div class="aisle"><h3>${a}</h3>`;
    items.forEach(i=>{
      const on = checked.has(i.key);
      html += `<div class="check ${on?'on':''}" onclick="toggleCheck('${i.key}')">
        <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#1A2B22" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span>
        <span class="name">${i.item}</span>
        <span class="qty">${qtyText(i.qty,i.unit)}</span>
      </div>`;
    });
    html += `</div>`;
  });
  host.innerHTML = html;
}
function toggleCheck(key){ const on=!checked.has(key); on?checked.add(key):checked.delete(key); renderCart(); on?dbCheck(key):dbUncheck(key); }
function clearChecks(){ checked.clear(); renderCart(); dbClearChecks(); }

/* ---- views ---- */
function setView(v){
  view=v;
  $("#tab-r").setAttribute("aria-selected", v==="recipes");
  $("#tab-c").setAttribute("aria-selected", v==="cart");
  $("#view-recipes").hidden = v!=="recipes";
  $("#view-cart").hidden = v!=="cart";
  if(v==="cart") renderCart();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---- synchro temps réel (Supabase) ---- */
const supa = (CONFIG.url && CONFIG.key && window.supabase)
  ? window.supabase.createClient(CONFIG.url, CONFIG.key) : null;
const SHARED = !!supa;
const LIST = CONFIG.list || "carnet";

function showStatus(){
  const el = $("#sync-status"); if(!el) return;
  el.textContent = SHARED ? "● Liste partagée en direct" : "○ Liste locale";
  el.className = SHARED ? "sync on" : "sync";
}

async function dbAddCart(id){ if(!SHARED)return; try{ await supa.from("cart").upsert({list_id:LIST,recipe_id:id,servings:sel.get(id)||4}); }catch(e){console.warn(e);} }
async function dbDelCart(id){ if(!SHARED)return; try{ await supa.from("cart").delete().eq("list_id",LIST).eq("recipe_id",id); }catch(e){console.warn(e);} }
async function dbServings(id){ if(!SHARED||!cart.has(id))return; try{ await supa.from("cart").update({servings:sel.get(id)}).eq("list_id",LIST).eq("recipe_id",id); }catch(e){console.warn(e);} }
async function dbCheck(key){ if(!SHARED)return; try{ await supa.from("checks").upsert({list_id:LIST,item_key:key}); }catch(e){console.warn(e);} }
async function dbUncheck(key){ if(!SHARED)return; try{ await supa.from("checks").delete().eq("list_id",LIST).eq("item_key",key); }catch(e){console.warn(e);} }
async function dbClearChecks(){ if(!SHARED)return; try{ await supa.from("checks").delete().eq("list_id",LIST); }catch(e){console.warn(e);} }
async function dbSetImage(id,url){ if(!SHARED)return; try{ await supa.from("recipe_images").upsert({recipe_id:id,url,updated_at:new Date().toISOString()}); }catch(e){console.warn(e);} }
async function dbDelImage(id){ if(!SHARED)return; try{ await supa.from("recipe_images").delete().eq("recipe_id",id); }catch(e){console.warn(e);} }
async function dbSetRating(id,stars){ if(!SHARED)return; try{ await supa.from("recipe_ratings").upsert({recipe_id:id,stars,updated_at:new Date().toISOString()}); }catch(e){console.warn(e);} }
async function dbDelRating(id){ if(!SHARED)return; try{ await supa.from("recipe_ratings").delete().eq("recipe_id",id); }catch(e){console.warn(e);} }
async function dbAddComment(id,author,body){ if(!SHARED)return; try{ await supa.from("recipe_comments").insert({recipe_id:id,author,body}); }catch(e){console.warn(e);} }
async function dbDelComment(cid){ if(!SHARED)return; try{ await supa.from("recipe_comments").delete().eq("id",cid); }catch(e){console.warn(e);} }

/* ---- changer la photo d'une recette (upload Supabase Storage) ---- */
function pmsg(id,t){ const e=$("#pm-"+id); if(e) e.textContent=t; }
async function resizeImage(file, max=1200, q=0.85){
  const img = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=URL.createObjectURL(file); });
  let w=img.width, h=img.height;
  if(Math.max(w,h)>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
  const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
  cv.getContext("2d").drawImage(img,0,0,w,h);
  return await new Promise(r=>cv.toBlob(r,"image/jpeg",q));
}
async function onPhotoPick(id, input){
  const file = input.files && input.files[0]; if(!file) return;
  if(!SHARED){ pmsg(id,"Active la synchro Supabase pour changer les photos."); return; }
  pmsg(id,"Envoi de la photo…");
  try{
    const blob = await resizeImage(file);
    const path = `${id}-${Date.now()}.jpg`;
    const up = await supa.storage.from("photos").upload(path, blob, { contentType:"image/jpeg", upsert:false });
    if(up.error) throw up.error;
    const url = supa.storage.from("photos").getPublicUrl(path).data.publicUrl;
    overrides.set(id, url);
    await dbSetImage(id, url);
    renderGrid(); openSheet(id); pmsg(id,"Photo mise à jour ✓");
  }catch(e){ console.warn(e); pmsg(id,"Échec : "+(e.message||e)); }
}
async function removePhoto(id){
  overrides.delete(id);
  await dbDelImage(id);
  renderGrid(); openSheet(id);
}

let pulling=false;
async function pullState(){
  if(!SHARED || pulling) return; pulling=true;
  try{
    const [c,k,im,ra,cm] = await Promise.all([
      supa.from("cart").select("recipe_id,servings").eq("list_id",LIST),
      supa.from("checks").select("item_key").eq("list_id",LIST),
      supa.from("recipe_images").select("recipe_id,url"),
      supa.from("recipe_ratings").select("recipe_id,stars"),
      supa.from("recipe_comments").select("id,recipe_id,author,body,created_at").order("created_at",{ascending:true})
    ]);
    cart.clear();
    (c.data||[]).forEach(r=>{ cart.add(r.recipe_id); sel.set(r.recipe_id, r.servings); });
    checked.clear();
    (k.data||[]).forEach(r=>checked.add(r.item_key));
    overrides.clear();
    (im.data||[]).forEach(r=>overrides.set(r.recipe_id, r.url));
    ratings.clear();
    (ra.data||[]).forEach(r=>ratings.set(r.recipe_id, r.stars));
    comments.clear();
    (cm.data||[]).forEach(r=>{ const a=comments.get(r.recipe_id)||[]; a.push(r); comments.set(r.recipe_id, a); });
    renderGrid(); updateCount(); if(view==="cart") renderCart();
    if(openId){ renderRating(openId); renderComments(openId); }
  }catch(e){ console.warn(e); }
  pulling=false;
}

renderFilters(); renderGrid(); updateCount(); showStatus();
if(SHARED){
  pullState();
  supa.channel("carnet-"+LIST)
    .on("postgres_changes",{event:"*",schema:"public",table:"cart"},   pullState)
    .on("postgres_changes",{event:"*",schema:"public",table:"checks"}, pullState)
    .on("postgres_changes",{event:"*",schema:"public",table:"recipe_images"}, pullState)
    .on("postgres_changes",{event:"*",schema:"public",table:"recipe_ratings"}, pullState)
    .on("postgres_changes",{event:"*",schema:"public",table:"recipe_comments"}, pullState)
    .subscribe();
}</script>
